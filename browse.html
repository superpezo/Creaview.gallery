<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Browse — Creaview</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <div class="noise"></div>
  <div class="cursor-light"></div>

  <header class="site-nav">
    <a href="index.html" class="nav-brand">
      <span class="nav-brand-mark">✦</span>
      <span>Creaview</span>
    </a>

    <nav class="nav-links">
      <a class="nav-link" href="index.html">Home</a>
      <a class="nav-link active" href="browse.html">Browse</a>
      <a class="nav-link" href="submit.html">Create</a>
    </nav>

    <a href="submit.html" class="nav-cta">Create Portfolio</a>
  </header>

  <main class="page-main page-shell page-transition">
    <section class="browse-header reveal">
      <div class="eyebrow">
        <span class="eyebrow-dot"></span>
        <span>Browse Gallery</span>
      </div>

      <h1 class="page-title">Find portfolios that match what you need.</h1>

      <p class="lead">
        Search by name, role, style, skill, platform, or type of work.
      </p>
    </section>

    <section class="search-panel reveal reveal-delay-1">
      <input
        id="searchInput"
        class="search-input"
        type="text"
        placeholder="Search portfolios..."
        autocomplete="off"
      />

      <button id="clearSearch" class="button button-secondary button-small" type="button">
        Clear
      </button>
    </section>

    <section id="portfolioGrid" class="portfolio-grid section-tight"></section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
