<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creaview — Portfolio Gallery</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

<div class="noise"></div>
<div class="cursor-light"></div>

<header class="nav">
  <a href="index.html" class="brand">
    <span class="brand-mark">✦</span>
    <span>Creaview</span>
  </a>

  <nav class="nav-links">
    <a href="browse.html">Browse</a>
    <a href="submit.html">Submit</a>
  </nav>
</header>

<main class="home">
  <section class="hero">
    <div class="hero-orb hero-orb-one"></div>
    <div class="hero-orb hero-orb-two"></div>

    <p class="eyebrow">Portfolio discovery platform</p>

    <h1>
      Find people by the work they actually show.
    </h1>

    <p class="hero-text">
      Creaview is a clean gallery for portfolios, skills, creative work, and professional profiles.
    </p>

    <div class="hero-actions">
      <a class="button primary" href="browse.html">Browse Portfolios</a>
      <a class="button secondary" href="submit.html">Submit Portfolio</a>
    </div>

    <div class="showcase">
      <div class="showcase-card card-one">
        <span>Community</span>
        <strong>Profile cards</strong>
      </div>

      <div class="showcase-card card-two">
        <span>Design</span>
        <strong>Visual work</strong>
      </div>

      <div class="showcase-card card-three">
        <span>Search</span>
        <strong>Find talent</strong>
      </div>
    </div>
  </section>
</main>

<script src="js/app.js"></script>
</body>
</html>
